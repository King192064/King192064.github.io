<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bulletin Board (Exercise)</title>
        <link href="css/setup.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet" data-meal-prep>
    </head>
    <body>
        <div id="bulletin-board">
            <!-- ADD YOUR HTML CODE INSIDE OF THIS DIV -->
            <div class="row">
      
                <div class="post-it">
                    <h3>Reminder</h3>
                    <p>Project Due @ 11:59pm</p>
                </div>

                <div class="post-it">
                    <h4>Groceries</h4>
                    <ul>
                        <li>Milk</li>
                        <li>Bread</li>
                        <li>Eggs</li>
                        <li>Orange Juice</li>
                    </ul>
                </div>

                <div class="post-it">
                    <h5>Inspiration</h5>
                    <img 
                        src="images/motivational.jpg"
                        alt="Motivation Image"
                    >
                </div>
            </div>
        </div>
    </body>
</html>

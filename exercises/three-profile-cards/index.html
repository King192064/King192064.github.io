<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <title>Document</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="single-column">

            <!-- flexbox container -->
            <div id="card-container">

                <div class="card">
                    <h3>Aqua</h3>
                    <p>
                        "My name is Master Aqua. Now return
                        my friend's heart or pay the price!"
                    </p>
                    <img 
                        src="images/Aqua.jpg" 
                        alt="Profile Image"
                        width="100"
                    >
                    <button>View Profile</button>
                </div>
                <!-- flexbox container -->
                <div id="card-container">

                    <div class="card">
                        <h3>Terra</h3>
                        <p>
                            "You will pay, Xehanort! Was my Master--no, 
                            my father, Eraqus not enough for you? 
                            Leave my friends alone!"
                        </p>
                        <img 
                            src="images/Terra 2.jpg" 
                            alt="Profile Image"
                            width="100"
                        >
                        <button>View Profile</button>
                    </div>
                    <!-- flexbox container -->
                    <div id="card-container">

                        <div class="card">
                            <h3>Ventus</h3>
                            <p>
                                "Trust me, you guys are ready. 
                                You're gonna clean up at the exam tomorrow."
                            </p>
                            <img 
                                src="images/Ven 1.jpg" 
                                alt="Profile Image"
                                width="100"
                            >
                            <button>View Profile</button>
                        </div>
                    </div>
                </div>
    </body>

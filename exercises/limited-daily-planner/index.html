<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div id="morning">
            <h2>Morning To-Do List</h2>
            <ul>
                <li class="completed">Wake up early</li>
                <li class="important">Eat breakfast</li>
                <li class="completed important">Do some Yoga</li>
            </ul>
            <a href="#" class="button">Remind later</a>
        </div>
        <div id="afternoon">
            <h2>Afternoon To-Do List</h2>
            <ul>
                <li class="important">Wash Clothes</li>
                <li class="completed">Fix everyone lunch</li>
                <li class="completed important">Drive Home</li>
            </ul>
            <a href="#" class="button">Remind later</a>
        </div>
        <div id="evening">
            <h2>Evening To-Do List</h2>
            <ul>
                <li class="important">Log onto class</li>
                <li class="completed">Eat dinner</li>
                <li class="completed important">Get ready for bed</li>
            </ul>
            <a href="#" class="button">Remind later</a>
        </div>
    </body>
</html>
